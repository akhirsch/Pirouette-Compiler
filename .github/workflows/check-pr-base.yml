name: check-pr-base

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'dev'

jobs:
  dev-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check with latest dev
        run: |
          git fetch origin dev:dev
          if git merge-base --is-ancestor origin/dev ${{ github.event.pull_request.head.sha }}; then
            echo "The PR is based on the latest dev."
          else
            echo "The PR is not an ancestor of the latest dev."
            echo "You need rebase/merge dev into this branch."
            exit 1
          fi
