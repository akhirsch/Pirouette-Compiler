name: check-pirc

on:
  workflow_call:
  workflow_dispatch:

  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - 'main'
      - 'dev'
    paths-ignore:
      - '.githooks/**'
      - '**/LICENSE'
      - '**/*.md'

  push:
    branches:
      - 'main'
      - 'dev'
    paths-ignore:
      - '.githooks/**'
      - '**/LICENSE'
      - '**/*.md'

permissions: read-all

jobs:
  lint-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1

      - name: Lint and format
        uses: ocaml/setup-ocaml/lint-fmt@v3

  build:
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1

      - name: Install dependencies
        run: opam install . --deps-only --with-test --with-doc

      - name: Build
        run: opam exec -- dune build
      - name: Build Docs
        run: opam exec -- dune build @doc
        
  Run-Test-Suite:
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run Tests
        run: |
          TEST_OUTPUT=$(opam exec -- dune test)
          SUMMARY_LINE=$($TEST_OUTPUT tail -n 1)
          if [[ SUMMARY_LINE == FAILED*]] ;
          then
            echo $TEST_OUTPUT
            exit 1
          fi
